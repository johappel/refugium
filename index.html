<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Refugium - Digitale Zuflucht</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0B0F17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#0B0F17] text-gray-200 overflow-hidden select-none font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          if (import.meta.env.PROD) {
            navigator.serviceWorker
              .register("/sw.js")
              .then((registration) => {
                console.log("SW registered with scope:", registration.scope);
              })
              .catch((error) => {
                console.error("SW registration failed:", error);
              });
            return;
          }

          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));

          if ("caches" in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
          }
        });
      }
    </script>
  </body>
</html>
